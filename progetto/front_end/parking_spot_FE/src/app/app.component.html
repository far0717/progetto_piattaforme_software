<section class="landing-page" *ngIf="!keycloak.isLoggedIn(); else dashboard">
  <div class="landing-copy">
    <p class="eyebrow">Smart parking booking</p>
    <h1>Parking Spot</h1>
    <p>Prenota il tuo posto auto </p>
    <div class="auth-actions">
      <button class="primary" (click)="login()">Login</button>
      <button class="outline" (click)="registrati()">Registrazione</button>
    </div>
  </div>

  <div class="parking-puzzle">
    <div class="parking-slot"><span>16</span></div>
    <div class="parking-slot"><span>06</span></div>
    <div class="parking-slot"><span>68</span></div>
    <div class="parking-slot"><span>88</span></div>
    <button class="parking-slot car-slot" (click)="login()" aria-label="Accedi">🚗</button>
    <div class="parking-slot"><span>98</span></div>
  </div>
</section>

<ng-template #dashboard>
  <header class="dashboard-header">
    <div>
      <p class="eyebrow light">Dashboard</p>
      <h1>Parking Spot</h1>
      <p>Benvenuto, {{ keycloak.username() }}</p>
    </div>
    <div class="user-box">
      <span>{{ keycloak.email() }}</span>
      <button (click)="logout()">Logout</button>
    </div>
  </header>
  <main class="dashboard-placeholder">
    <h2>Accesso completato</h2>

  </main>
</ng-template>
